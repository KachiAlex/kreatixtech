app = 'kreatixtech'
primary_region = 'iad'

[build]

[env]
  PORT = '5000'

[processes]
  app = "node start.mjs"

[[services]]
  internal_port = 5000
  protocol = 'tcp'
  processes = ['app']
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ['http']
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ['tls', 'http']
    port = 443

  [[services.tcp_checks]]
    grace_period = '1m'
    interval = '15s'
    timeout = '5s'

  [services.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
